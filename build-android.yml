
# .github/workflows/build-android.yml → 项目根目录

name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 设置 Node.js（不使用 18，使用 20）─────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. 设置 JDK 21（Capacitor Android 需要）──────────────────
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── 4. 安装 Android SDK（通过 setup-android）─────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. 接受 Android SDK 许可证 ──────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── 6. 安装项目依赖 ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. 写入环境变量（Gemini API Key 等）────────────────────
      - name: Create .env.local
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local

      # ── 8. 构建 Web 资源（生成 dist/ 目录）──────────────────────
      - name: Build web assets
        run: npm run build

      # ── 9. 安装 Capacitor（如果 package.json 里已有则跳过）──────
      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core || true
          npm install -D @capacitor/cli @capacitor/android || true

      # ── 10. 初始化 Capacitor（幂等，已存在则跳过）──────────────
      - name: Init Capacitor (skip if already initialized)
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "悦泉修仙" "com.flowwater.app" --web-dir dist
          else
            echo "Capacitor already initialized, skipping."
          fi

      # ── 11. 确认 capacitor.config webDir 为 dist ────────────────
      - name: Ensure capacitor webDir is dist
        run: |
          if [ -f capacitor.config.ts ]; then
            sed -i 's/webDir:.*/webDir: "dist",/' capacitor.config.ts
          fi
          if [ -f capacitor.config.json ]; then
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('capacitor.config.json'));
              cfg.webDir = 'dist';
              fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
            "
          fi

      # ── 12. 添加 Android 平台（幂等）───────────────────────────
      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "Android platform already exists."
          fi

      # ── 13. 同步 Web 资源到 Android 工程 ───────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 14. 修复 Kotlin 依赖冲突（build.gradle）────────────────
      - name: Fix Kotlin stdlib conflict in build.gradle
        run: |
          FILE="android/build.gradle"
          PATCH='
          subprojects {
              configurations.all {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
              }
          }'
          if ! grep -q "kotlin-stdlib-jdk7" "$FILE"; then
            echo "$PATCH" >> "$FILE"
            echo "Kotlin stdlib conflict fix applied."
          else
            echo "Fix already present."
          fi

      # ── 15. 赋予 gradlew 执行权限 ───────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # ── 16. 构建 Debug APK ──────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 17. 上传 APK 为 Artifact ────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── 18. （可选）构建 Release APK（需要签名配置）────────────
      # 如需发布到 Play Store，取消以下注释并配置签名
      # - name: Build Release APK
      #   working-directory: android
      #   run: ./gradlew assembleRelease --no-daemon
      #   env:
      #     KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #     STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
