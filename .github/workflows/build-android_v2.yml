# 上传到 GitHub Releases，这样 APK 永久保存、有版本号、可以直接分享下载链接

name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 需要写入权限才能创建 Release
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local

      - name: Build web assets
        run: npm run build

      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core || true
          npm install -D @capacitor/cli @capacitor/android || true

      - name: Init Capacitor (skip if already initialized)
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "悦泉修仙" "com.flowwater.app" --web-dir dist
          else
            echo "Capacitor already initialized, skipping."
          fi

      - name: Ensure capacitor webDir is dist
        run: |
          if [ -f capacitor.config.ts ]; then
            sed -i 's/webDir:.*/webDir: "dist",/' capacitor.config.ts
          fi

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "Android platform already exists."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin stdlib conflict
        run: |
          FILE="android/build.gradle"
          PATCH='
          subprojects {
              configurations.all {
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk7"
                  exclude group: "org.jetbrains.kotlin", module: "kotlin-stdlib-jdk8"
              }
          }'
          if ! grep -q "kotlin-stdlib-jdk7" "$FILE"; then
            echo "$PATCH" >> "$FILE"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 重命名 APK，加入构建编号和短 SHA ────────────────────────
      - name: Rename APK with version info
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          NEW_NAME="yueqian-build${{ github.run_number }}-${SHORT_SHA}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$NEW_NAME"
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_ENV

      # ── 保留 Actions Artifact（7天临时备份）────────────────────
      - name: Upload artifact (7-day backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.APK_NAME }}
          retention-days: 7

      # ── 上传到 GitHub Release（永久保存）────────────────────────
      # 只有 push 到主分支时才创建，PR 时跳过
      - name: Create GitHub Release and upload APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          body: |
            ## 悦泉修仙 Android APK

            | 字段 | 内容 |
            |------|------|
            | 构建编号 | #${{ github.run_number }} |
            | 提交 SHA | `${{ github.sha }}` |
            | 分支 | `${{ github.ref_name }}` |
            | 提交信息 | ${{ github.event.head_commit.message }} |

            ### 📲 安装方法
            1. 点击下方 `.apk` 文件下载
            2. 手机进入 **设置 → 安全 → 允许未知来源安装**
            3. 打开下载的 APK 安装即可
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: true
