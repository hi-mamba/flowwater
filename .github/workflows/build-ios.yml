name: Build iOS IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 允许手动触发

jobs:
  build-ios:
    # iOS 必须在 macOS runner 上构建
    runs-on: macos-latest

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 设置 Node.js 20（不使用 18）──────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. 显示 Xcode 版本 ──────────────────────────────────────
      - name: Show Xcode version
        run: xcodebuild -version

      # ── 4. 安装 CocoaPods ───────────────────────────────────────
      - name: Install CocoaPods
        run: sudo gem install cocoapods

      # ── 5. 安装项目依赖 ─────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. 写入环境变量 ──────────────────────────────────────────
      - name: Create .env.local
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env.local

      # ── 7. 构建 Web 资源 ─────────────────────────────────────────
      - name: Build web assets
        run: npm run build

      # ── 8. 安装 Capacitor 包 ────────────────────────────────────
      - name: Install Capacitor packages
        run: |
          npm install @capacitor/core || true
          npm install -D @capacitor/cli @capacitor/ios || true

      # ── 9. 初始化 Capacitor（幂等）──────────────────────────────
      - name: Init Capacitor (skip if already initialized)
        run: |
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "悦泉修仙" "com.flowwater.app" --web-dir dist
          else
            echo "Capacitor already initialized, skipping."
          fi

      # ── 10. 确认 webDir ──────────────────────────────────────────
      - name: Ensure capacitor webDir is dist
        run: |
          if [ -f capacitor.config.ts ]; then
            sed -i '' 's/webDir:.*/webDir: "dist",/' capacitor.config.ts
          fi
          if [ -f capacitor.config.json ]; then
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('capacitor.config.json'));
              cfg.webDir = 'dist';
              fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
            "
          fi

      # ── 11. 添加 iOS 平台（幂等）────────────────────────────────
      - name: Add iOS platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          else
            echo "iOS platform already exists."
          fi

      # ── 12. 同步到 iOS 工程 ──────────────────────────────────────
      - name: Sync Capacitor to iOS
        run: npx cap sync ios

      # ── 13. 安装 CocoaPods 依赖 ──────────────────────────────────
      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      # ── 14. 构建 iOS App（未签名，适合 CI）──────────────────────
      # 说明：无开发者账号时构建未签名版本，输出 .app 而非 .ipa
      - name: Build iOS (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || true

      # ── 15. 打包为 IPA（需要有效的签名证书）────────────────────
      # 如有 Apple 开发者证书，取消以下步骤注释并配置 Secrets
      #
      # - name: Import signing certificate
      #   run: |
      #     echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      #     security list-keychains -s build.keychain
      #
      # - name: Install provisioning profile
      #   run: |
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode \
      #       > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      #
      # - name: Build signed IPA
      #   run: |
      #     xcodebuild \
      #       -workspace ios/App/App.xcworkspace \
      #       -scheme App \
      #       -configuration Release \
      #       -archivePath ios/App.xcarchive \
      #       archive
      #     xcodebuild \
      #       -exportArchive \
      #       -archivePath ios/App.xcarchive \
      #       -exportOptionsPlist ios/ExportOptions.plist \
      #       -exportPath ios/output

      # ── 16. 上传构建产物 ─────────────────────────────────────────
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          # 未签名时上传 .app，签名后改为 ios/output/*.ipa
          path: ios/DerivedData/Build/Products/Debug-iphonesimulator/App.app
          retention-days: 7
